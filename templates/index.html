<!DOCTYPE html>
<html>
<head>

  <title>YouTube Transcript Extractor</title>

  <style>

    body {
      font-family: Arial;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
    }

    textarea {
      width: 100%;
      height: 400px;
      margin-top: 20px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }

  </style>

</head>

<body>

<h1>YouTube Transcript Extractor</h1>

<input
  id="youtubeUrl"
  placeholder="Paste YouTube URL"
>

<button onclick="getTranscript()">
  Get Transcript
</button>

<textarea id="transcript"></textarea>

<button onclick="copyTranscript()">
  Copy to Clipboard
</button>

<script>

function extractVideoId(url) {

  const match = url.match(
    /(?:v=|youtu\.be\/)([^&\\n?#]+)/
  );

  return match ? match[1] : null;
}

async function getTranscript() {

  const url =
    document.getElementById("youtubeUrl").value;

  const videoId = extractVideoId(url);

  if (!videoId) {

    alert("Invalid URL");

    return;
  }

  try {

    const response = await fetch(
      `/transcript/${videoId}`
    );

    const data = await response.json();

    document.getElementById(
      "transcript"
    ).value = data.transcript;

  } catch (err) {

    console.error(err);

    alert("Failed to fetch transcript");
  }
}

function copyTranscript() {

  const textarea =
    document.getElementById("transcript");

  textarea.select();

  document.execCommand("copy");
}

</script>

</body>
</html>
