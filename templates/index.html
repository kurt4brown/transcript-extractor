<!DOCTYPE html>
<html>

<head>

  <title>YouTube Transcript Extractor</title>

  <style>

    body {
      font-family: Arial;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background-color: #111;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 10px;
      box-sizing: border-box;
      background-color: #222;
      color: white;
      border: 1px solid #444;
    }

    textarea {
      width: 100%;
      height: 500px;
      margin-top: 20px;
      padding: 12px;
      font-size: 14px;
      box-sizing: border-box;
      background-color: #222;
      color: white;
      border: 1px solid #444;
    }

    button {
      padding: 12px 20px;
      margin-right: 10px;
      cursor: pointer;
      border: none;
      background-color: #444;
      color: white;
      font-size: 14px;
    }

    button:hover {
      background-color: #666;
    }

  </style>

</head>

<body>

  <h1>YouTube Transcript Extractor</h1>

  <input
    id="youtubeUrl"
    placeholder="Paste YouTube URL"
  >

  <button onclick="getTranscript()">
    Get Transcript
  </button>

  <button onclick="copyTranscript()">
    Copy to Clipboard
  </button>

  <textarea
    id="transcript"
    placeholder="Transcript will appear here..."
  ></textarea>

  <script>

    function extractVideoId(url) {

      const match = url.match(
        /(?:v=|youtu\.be\/|shorts\/)([^&\n?#]+)/
      );

      return match ? match[1] : null;
    }

    async function getTranscript() {

      const url =
        document.getElementById("youtubeUrl").value;

      const videoId = extractVideoId(url);

      if (!videoId) {

        alert("Invalid YouTube URL");

        return;
      }

      document.getElementById(
        "transcript"
      ).value = "Loading transcript...";

      try {

        const response = await fetch(
          `/transcript/${videoId}`
        );

        const data = await response.json();

        console.log(data);

        if (data.transcript) {

          document.getElementById(
            "transcript"
          ).value = data.transcript;

        } else {

          document.getElementById(
            "transcript"
          ).value =
            "ERROR:\n\n" +
            JSON.stringify(data, null, 2);
        }

      } catch (err) {

        console.error(err);

        document.getElementById(
          "transcript"
        ).value =
          "Frontend Error:\n\n" + err;
      }
    }

    function copyTranscript() {

      const textarea =
        document.getElementById("transcript");

      navigator.clipboard.writeText(
        textarea.value
      );

      alert("Copied to clipboard");
    }

  </script>

</body>

</html>
